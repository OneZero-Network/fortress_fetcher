<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚔️ Fortress Sniper</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 { font-size: 28px; font-weight: 800; color: #38bdf8; letter-spacing: -0.5px; }
  header p  { font-size: 13px; color: #64748b; margin-top: 4px; }

  .card {
    width: 100%;
    max-width: 420px;
    background: #1e293b;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .card label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .card input {
    width: 100%;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    color: #f1f5f9;
    font-family: "Menlo", "Consolas", monospace;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .card input:focus { border-color: #38bdf8; }

  .save-btn {
    width: 100%;
    background: #1e3a5f;
    color: #7dd3fc;
    border: none;
    border-radius: 10px;
    padding: 11px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .save-btn:hover { background: #1e4a7a; }

  .big-btn {
    width: 100%;
    max-width: 420px;
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 20px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 12px;
    box-shadow: 0 4px 24px rgba(22,163,74,0.35);
    transition: transform 0.1s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .big-btn:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(22,163,74,0.2); }
  .big-btn:disabled { background: #334155; color: #64748b; box-shadow: none; cursor: not-allowed; }

  .status-card {
    width: 100%;
    max-width: 420px;
    background: #1e293b;
    border-radius: 16px;
    padding: 20px;
    margin-top: 4px;
    display: none;
  }
  .status-card.visible { display: block; }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid #334155;
    border-top-color: #38bdf8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-text { font-size: 14px; color: #94a3b8; }
  .status-text b { color: #e2e8f0; }

  .result-box {
    background: #0f172a;
    border-radius: 10px;
    padding: 14px;
    margin-top: 8px;
    font-size: 13px;
    line-height: 1.7;
    display: none;
  }
  .result-box.visible { display: block; }
  .result-ok   { color: #4ade80; }
  .result-err  { color: #f87171; }
  .result-info { color: #38bdf8; }

  .last-run {
    font-size: 11px;
    color: #475569;
    text-align: center;
    margin-top: 16px;
  }

  .divider {
    width: 100%;
    max-width: 420px;
    border: none;
    border-top: 1px solid #1e293b;
    margin: 8px 0 16px;
  }

  .hint { font-size: 11px; color: #475569; text-align: center; margin-top: 12px; line-height: 1.5; }
</style>
</head>
<body>

<header>
  <h1>⚔️ Fortress Sniper</h1>
  <p>NSE Data Updater — works from anywhere</p>
</header>

<!-- Config Card -->
<div class="card" id="configCard">
  <label>GitHub Personal Access Token <span style="color:#f59e0b;font-weight:400;text-transform:none;">⚠️ session only — clears on tab close</span></label>
  <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">

  <label>GitHub Repo (owner/repo)</label>
  <input type="text" id="ghRepo" placeholder="YourName/fortress-sniper">

  <label>Branch</label>
  <input type="text" id="ghBranch" placeholder="main" value="main">

  <button class="save-btn" onclick="saveConfig()">💾 Save to this device</button>
</div>

<!-- Trigger Button -->
<button class="big-btn" id="triggerBtn" onclick="triggerRun()">
  🚀 Fetch NSE Data Now
</button>

<!-- Status -->
<div class="status-card" id="statusCard">
  <div class="status-row">
    <div class="spinner" id="spinner"></div>
    <div class="status-text" id="statusText"><b>Triggering GitHub Actions...</b></div>
  </div>
  <div class="result-box" id="resultBox"></div>
</div>

<p class="last-run" id="lastRun"></p>
<p class="hint">
  GitHub Actions runs on Indian cloud servers.<br>
  Your Telegram will get the update in ~3–5 minutes.
</p>

<script>
const STORAGE_KEY    = "fortress_config";
const SESSION_KEY    = "fortress_session";   // PAT lives here — cleared when tab closes

function saveConfig() {
  const cfg = {
    repo:   document.getElementById("ghRepo").value.trim(),
    branch: document.getElementById("ghBranch").value.trim() || "main",
  };
  const token = document.getElementById("ghToken").value.trim();
  if (!token || !cfg.repo) {
    alert("Please enter both GitHub Token and Repo.");
    return;
  }
  // Token goes to sessionStorage only (auto-cleared on tab close — safer on shared devices)
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({ token }));
  // Non-secret config persists
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
  showResult("✅ Saved! Repo stored on device. Token kept in session only (clears on tab close).", "ok");
}

function loadConfig() {
  try {
    const cfg = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    if (cfg.repo)   document.getElementById("ghRepo").value   = cfg.repo;
    if (cfg.branch) document.getElementById("ghBranch").value = cfg.branch;
  } catch(e) {}
  try {
    const sess = JSON.parse(sessionStorage.getItem(SESSION_KEY) || "{}");
    if (sess.token) document.getElementById("ghToken").value = sess.token;
  } catch(e) {}

  const last = localStorage.getItem("fortress_last_run");
  if (last) document.getElementById("lastRun").textContent = "Last triggered: " + last;
}

function showStatus(visible) {
  document.getElementById("statusCard").classList.toggle("visible", visible);
}
function showResult(msg, type) {
  const box = document.getElementById("resultBox");
  box.className = "result-box visible result-" + type;
  box.innerHTML = msg;
}
function setSpinner(active) {
  document.getElementById("spinner").style.display = active ? "block" : "none";
}

async function triggerRun() {
  const token  = document.getElementById("ghToken").value.trim();
  const repo   = document.getElementById("ghRepo").value.trim();
  const branch = document.getElementById("ghBranch").value.trim() || "main";

  if (!token || !repo) {
    alert("Please fill in your GitHub Token and Repo first, then tap Save.");
    return;
  }

  const btn = document.getElementById("triggerBtn");
  btn.disabled = true;
  btn.innerHTML = "⏳ Triggering...";

  showStatus(true);
  setSpinner(true);
  document.getElementById("statusText").innerHTML = "<b>Calling GitHub Actions API...</b>";
  document.getElementById("resultBox").className = "result-box";

  const workflow = "fortress_fetcher.yml";
  const url = `https://api.github.com/repos/${repo}/actions/workflows/${workflow}/dispatches`;

  try {
    const resp = await fetch(url, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Accept": "application/vnd.github.v3+json",
        "Content-Type": "application/json",
        "X-GitHub-Api-Version": "2022-11-28",
      },
      body: JSON.stringify({ ref: branch, inputs: { reason: "Triggered from phone" } }),
    });

    setSpinner(false);

    if (resp.status === 204) {
      const now = new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" });
      localStorage.setItem("fortress_last_run", now + " IST");
      document.getElementById("lastRun").textContent = "Last triggered: " + now + " IST";

      document.getElementById("statusText").innerHTML = "<b>✅ Workflow started!</b>";
      showResult(
        "✅ <b>GitHub Actions triggered successfully.</b><br><br>" +
        "📊 NSE data is being fetched on the cloud now.<br>" +
        "📱 You'll get a Telegram message in ~3–5 minutes.<br><br>" +
        '<a href="https://github.com/' + escHtml(repo) + '/actions" target="_blank" ' +
        'style="color:#38bdf8;">👁️ Watch live on GitHub Actions →</a>',
        "ok"
      );
    } else if (resp.status === 401) {
      document.getElementById("statusText").innerHTML = "<b>❌ Auth failed</b>";
      showResult(
        "❌ <b>GitHub Token is invalid or expired.</b><br>" +
        "Go to GitHub → Settings → Developer Settings → Personal Access Tokens<br>" +
        "Create a new token with <b>repo</b> and <b>workflow</b> scopes.",
        "err"
      );
    } else if (resp.status === 404) {
      document.getElementById("statusText").innerHTML = "<b>❌ Workflow not found</b>";
      showResult(
        "❌ <b>Workflow file not found.</b><br>" +
        "Make sure <code>fortress_fetcher.yml</code> is in <code>.github/workflows/</code> of your repo, " +
        "and the repo name is spelled correctly.",
        "err"
      );
    } else {
      // Use textContent for raw API error body — prevents HTML injection
      const text = await resp.text();
      document.getElementById("statusText").innerHTML = "<b>❌ Error " + resp.status + "</b>";
      const box = document.getElementById("resultBox");
      box.className = "result-box visible result-err";
      const pre = document.createElement("small");
      pre.textContent = text.slice(0, 300);
      box.innerHTML = "❌ GitHub returned HTTP " + resp.status + ": ";
      box.appendChild(pre);
    }
  } catch(e) {
    setSpinner(false);
    document.getElementById("statusText").innerHTML = "<b>❌ Network error</b>";
    const box = document.getElementById("resultBox");
    box.className = "result-box visible result-err";
    const detail = document.createElement("small");
    detail.textContent = e.message;
    box.innerHTML = "❌ <b>Network error.</b> Check your internet connection.<br>";
    box.appendChild(detail);
  }

  btn.disabled = false;
  btn.innerHTML = "🚀 Fetch NSE Data Now";
}

// Escape HTML to prevent injection in dynamic content
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

loadConfig();
</script>
</body>
</html>
